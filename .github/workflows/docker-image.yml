name: User API Docker Image CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  ROOT_IMAGE_NAME: "emezon"
  USERAPI_TAG: "user-api"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
    - uses: actions/checkout@v4
    - name: Build and push the Docker image
      run: |
          docker build -t $ROOT_IMAGE_NAME:$USERAPI_TAG ${{ github.workspace }}/user_api
          docker tag $ROOT_IMAGE_NAME:$USERAPI_TAG ${{ secrets.DOCKER_USERNAME }}/$ROOT_IMAGE_NAME:$USERAPI_TAG
    - name: Push image to Docker reg
      run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/$ROOT_IMAGE_NAME:$USERAPI_TAG }}
